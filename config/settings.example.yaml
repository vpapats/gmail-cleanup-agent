mode: shadow # shadow | active
use_model: true
min_trash_confidence: 0.93
max_messages_per_run: 50
recent_messages_per_run: 20
candidate_scan_limit: 5000
approved_trash_senders:
  - news.bloomberg.com
  - newsletter.example.com
candidate_queries:
  - "in:inbox -label:AI/Important -label:AI/Action-Needed -label:AI/Review -label:AI/Low-Priority -label:AI/FOMO-Summarized -label:AI/Wrongly-Trashed"
labels:
  important: AI/Important
  action_needed: AI/Action-Needed
  low_priority: AI/Low-Priority
  review: AI/Review
  daily_summary: AI/FOMO-Summarized
  wrongly_trashed: AI/Wrongly-Trashed
daily_summary:
  enabled: true
  decisions:
    - review
    - low_priority
  trash_after_send: true
  send_when_empty: true
  subject_prefix: "Today's GMAIL FOMO summary"
