name: Gmail Triage

on:
  schedule:
    # Runs daily at 08:00, 16:00, and 22:00 UTC
    - cron: "0 8,16,22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gmail-triage
  cancel-in-progress: false

jobs:
  run-triage:
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || 'google/gemini-3.1-pro-preview' }}
      OPENROUTER_MAX_ATTACHMENT_BYTES: ${{ vars.OPENROUTER_MAX_ATTACHMENT_BYTES || '750000' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          missing=0
          for key in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REFRESH_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: ${key}"
              echo "- ❌ ${key}" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            else
              echo "- ✅ ${key}" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Set missing repository secrets at: Settings → Secrets and variables → Actions." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Validate Gmail auth
        id: gmail-auth
        continue-on-error: ${{ github.event_name == 'schedule' }}
        run: PYTHONPATH=. python scripts/check_gmail_auth.py

      - name: Report scheduled auth issue
        if: github.event_name == 'schedule' && steps.gmail-auth.outcome != 'success'
        run: |
          echo "::warning::Scheduled Gmail triage skipped because GOOGLE_REFRESH_TOKEN is invalid or expired."
          echo "Regenerate the token with scripts/gmail_oauth_bootstrap.py and update the GOOGLE_REFRESH_TOKEN repository secret." >> "$GITHUB_STEP_SUMMARY"

      - name: Run triage
        if: steps.gmail-auth.outcome == 'success'
        run: PYTHONPATH=. python scripts/run_triage.py --config config/settings.yaml --audit-dir audit

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: triage-audit-${{ github.run_id }}
          path: audit/
          if-no-files-found: ignore
