name: Gmail Triage

on:
  schedule:
    # Runs daily at 08:00, 16:00, and 22:00 UTC
    - cron: "0 8,16,22 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gmail-triage
  cancel-in-progress: false

jobs:
  run-triage:
    if: github.event_name != 'schedule' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          missing=0
          for key in GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REFRESH_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required secret: ${key}"
              echo "- ❌ ${key}" >> "$GITHUB_STEP_SUMMARY"
              missing=1
            else
              echo "- ✅ ${key}" >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Set missing repository secrets at: Settings → Secrets and variables → Actions." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Run triage
        run: PYTHONPATH=. python scripts/run_triage.py --config config/settings.yaml --audit-dir audit

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: triage-audit-${{ github.run_id }}
          path: audit/
          if-no-files-found: ignore
